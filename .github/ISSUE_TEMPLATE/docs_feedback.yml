name: Documentation feedback
description: Report an issue or gap in the ONEScript documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: page
    attributes:
      label: Documentation page
      description: Paste the relevant docs.ones.com URL.
      placeholder: https://docs.ones.com/onescript/...
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: What should be improved?
      description: Describe the incorrect, missing, or unclear content.
    validations:
      required: true
