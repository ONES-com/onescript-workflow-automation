name: Installation problem
description: Report a problem downloading, uploading, or enabling the ONEScript package.
title: "[Install]: "
labels:
  - installation
body:
  - type: input
    id: package_version
    attributes:
      label: ONEScript package version
      description: "Example: v1.0.8"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      options:
        - Private / On-Premises
        - SaaS
        - Not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Installation problem
      description: Tell us where the installation failed, such as download, upload, enablement, or first run.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Include ONES version, browser, deployment notes, and any relevant error message.
    validations:
      required: false
